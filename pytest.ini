[pytest]
DJANGO_SETTINGS_MODULE = Project.settings_test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -ra
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --no-cov-on-fail
    -p no:warnings
markers =
    unit: Pure unit tests (no DB, no network)
    integration: Tests that use DB or mock services
    api: REST API endpoint tests
    e2e: End-to-end user journey tests
    slow: Tests that take > 5 seconds
    security: Security-related tests
    smoke: Quick smoke tests
    seo: SEOAnalyzer app tests
    keyword: keyword_ai app tests
    comparative: comparative_analysis app tests
    subscription: subscriptions app tests
    auth: Authentication / authorisation tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::RuntimeWarning

testpaths =
    tests

norecursedirs =
    .git
    .tox
    .env
    venv
    __pycache__
    *.egg
    build
    dist
    migrations
    static
    media
    htmlcov
    .pytest_cache
