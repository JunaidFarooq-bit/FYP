{% if request.session.upgrade_required %}
<!-- Upgrade Required Modal -->
<div id="upgradeModal" class="upgrade-modal" role="dialog" aria-modal="true" aria-labelledby="upgradeModalTitle">
  <button class="upgrade-modal-backdrop" type="button" onclick="closeUpgradeModal()" aria-label="Close upgrade prompt"></button>

  <div class="upgrade-modal-card">
    <div class="upgrade-modal-top">
      <div class="upgrade-modal-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <h4 id="upgradeModalTitle">Upgrade Your Plan</h4>
      <p>Unlock the full power of WebLift</p>
    </div>

    <div class="upgrade-modal-body">
      <div class="upgrade-modal-reason">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>{{ request.session.upgrade_reason }}</p>
      </div>

      <p class="upgrade-modal-kicker">What you unlock:</p>
      <ul class="upgrade-modal-features">
        <li><span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>More SEO audits every month</li>
        <li><span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>AI keyword suggestions &amp; competitor analysis</li>
        <li><span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>PDF export &amp; full API access</li>
      </ul>

      <div class="upgrade-modal-actions">
        <a href="{% url 'subscriptions:pricing' %}" class="upgrade-modal-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          View Plans
        </a>
        <button type="button" onclick="closeUpgradeModal()" class="upgrade-modal-secondary">Maybe Later</button>
      </div>
    </div>
  </div>
</div>

<style>
  .upgrade-modal,
  .upgrade-modal * {
    box-sizing: border-box;
  }

  .upgrade-modal {
    align-items: flex-start !important;
    display: flex !important;
    inset: 0 !important;
    justify-content: center !important;
    height: 100vh;
    height: 100dvh;
    max-width: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 18px;
    position: fixed !important;
    width: 100%;
    z-index: 99999 !important;
  }

  .upgrade-modal-backdrop {
    background: rgba(0, 0, 0, 0.55);
    border: 0;
    cursor: pointer;
    inset: 0;
    padding: 0;
    position: absolute;
    backdrop-filter: blur(3px);
  }

  .upgrade-modal-card {
    animation: upgradeModalIn 0.25s ease;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.22);
    max-height: calc(100vh - 36px);
    max-height: calc(100dvh - 36px);
    flex: 0 1 460px;
    margin: auto 0;
    max-width: min(460px, calc(100vw - 36px));
    min-width: 0;
    overflow: auto;
    overscroll-behavior: contain;
    position: relative;
    width: 100%;
  }

  .upgrade-modal-card > * {
    min-width: 0;
  }

  .upgrade-modal-top {
    background: #023761;
    color: #fff;
    padding: 28px 28px 22px;
    text-align: center;
  }

  .upgrade-modal-icon {
    align-items: center;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 50%;
    display: inline-flex;
    height: 56px;
    justify-content: center;
    margin-bottom: 12px;
    width: 56px;
  }

  .upgrade-modal-top h4 {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 0 0 4px;
  }

  .upgrade-modal-top p {
    font-size: 0.9rem;
    margin: 0;
    opacity: 0.85;
  }

  .upgrade-modal-body {
    padding: 24px 28px;
  }

  .upgrade-modal-reason {
    align-items: flex-start;
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 10px;
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    padding: 14px 16px;
  }

  .upgrade-modal-reason svg {
    flex: 0 0 auto;
    margin-top: 1px;
  }

  .upgrade-modal-reason p {
    color: #92400e;
    font-size: 0.875rem;
    line-height: 1.5;
    margin: 0;
  }

  .upgrade-modal-kicker {
    color: #666;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin: 0 0 10px;
    text-transform: uppercase;
  }

  .upgrade-modal-features {
    display: flex;
    flex-direction: column;
    gap: 8px;
    list-style: none;
    margin: 0 0 22px;
    padding: 0;
  }

  .upgrade-modal-features li {
    align-items: center;
    color: #333;
    display: flex;
    font-size: 0.875rem;
    gap: 10px;
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .upgrade-modal-features span {
    align-items: center;
    background: #e8f5e9;
    border-radius: 50%;
    display: inline-flex;
    flex: 0 0 20px;
    height: 20px;
    justify-content: center;
    width: 20px;
  }

  .upgrade-modal-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .upgrade-modal-primary,
  .upgrade-modal-secondary {
    align-items: center;
    border-radius: 8px;
    display: inline-flex;
    font-size: 0.9rem;
    font-weight: 600;
    justify-content: center;
    min-height: 44px;
    min-width: 0;
    padding: 11px 16px;
  }

  .upgrade-modal-primary {
    background: #02569b;
    color: #fff !important;
    flex: 1;
    gap: 8px;
    text-decoration: none !important;
  }

  .upgrade-modal-secondary {
    background: #f5f5f5;
    border: 0;
    color: #555;
    cursor: pointer;
  }


  @media (max-width: 360px) {
    .upgrade-modal {
      align-items: flex-start !important;
      padding: 8px;
    }

    .upgrade-modal-card {
      max-height: calc(100vh - 16px);
      max-height: calc(100dvh - 16px);
      max-width: calc(100vw - 16px);
    }
  .upgrade-modal-top {
      padding-bottom: 16px;
      padding-top: 20px;
    }

    .upgrade-modal-body {
      padding-bottom: 18px;
      padding-top: 18px;
    }

    .upgrade-modal-icon {
      height: 46px;
      width: 46px;
    }
  }
  @keyframes upgradeModalIn {
    from { opacity: 0; transform: scale(0.92) translateY(16px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  @media (max-width: 520px) {
    .upgrade-modal {
      padding: 12px;
    }

    .upgrade-modal-card {
      max-height: calc(100vh - 24px);
      max-height: calc(100dvh - 24px);
      max-width: calc(100vw - 24px);
    }

    .upgrade-modal-top,
    .upgrade-modal-body {
      padding-left: 20px;
      padding-right: 20px;
    }

    .upgrade-modal-actions {
      flex-direction: column;
    }
  }
</style>

<script>
  function closeUpgradeModal() {
    var el = document.getElementById('upgradeModal');
    if (el) el.style.display = 'none';
    fetch('{% url "subscriptions:clear_upgrade_flag" %}', { method: 'POST', headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
  }

  document.addEventListener('DOMContentLoaded', function() {
    var modal = document.getElementById('upgradeModal');
    if (modal && modal.parentElement !== document.body) {
      document.body.appendChild(modal);
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeUpgradeModal();
  });
</script>
{% endif %}
