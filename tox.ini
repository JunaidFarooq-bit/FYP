[tox]
envlist = py311, py310, flake8, coverage
skipsdist = True

[testenv]
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/requirements-test.txt
setenv =
    DJANGO_SETTINGS_MODULE = Project.settings_test
    PYTHONPATH = {toxinidir}
commands =
    pytest {posargs}

[testenv:py311]
basepython = python3.11
commands =
    pytest -v --tb=short {posargs}

[testenv:py310]
basepython = python3.10
commands =
    pytest -v --tb=short {posargs}

[testenv:flake8]
deps = flake8
commands = flake8 SEOAnalyzer keyword_ai comparative_analysis subscriptions --max-line-length=120 --exclude=migrations,__pycache__,venv

[testenv:coverage]
deps =
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/requirements-test.txt
commands =
    pytest --cov=. --cov-report=term-missing --cov-report=html --cov-report=xml {posargs}

[testenv:security]
deps =
    bandit
    safety
commands =
    bandit -r SEOAnalyzer keyword_ai comparative_analysis subscriptions -f json -o bandit-report.json || true
    safety check || true

[flake8]
max-line-length = 120
exclude = 
    .git,
    __pycache__,
    venv,
    env,
    .env,
    migrations,
    settings_test.py
ignore = 
    E203,
    E266,
    E501,
    W503,
    F403,
    F401

[coverage:run]
source = .
omit =
    */migrations/*
    */tests/*
    */venv/*
    */env/*
    manage.py
    */settings*.py
    */wsgi.py
    */asgi.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
